<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-pulse Manuais</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPR1qEg7fTyig8JzegWSgj-H_JmTD5nAU",
      authDomain: "manualepulse.firebaseapp.com",
      projectId: "manualepulse",
      storageBucket: "manualepulse.firebasestorage.app",
      messagingSenderId: "889930198944",
      appId: "1:889930198944:web:7ff8a53ae090bd04fcbec5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const DOC_REF = doc(db, "epulse", "manuais");
    const ADMIN_PASSWORD = "E-pulse85380810";

    const INITIAL_DATA = {
      patinetes: [
        { id: "p1", name: "Force 350W", pdfUrl: "" },
        { id: "p2", name: "G1 350W", pdfUrl: "" },
        { id: "p3", name: "G2 800W", pdfUrl: "" },
        { id: "p4", name: "G3 Pro 800W", pdfUrl: "" },
        { id: "p5", name: "Street ou Joy 500W", pdfUrl: "" }
      ],
      bikes: [
        { id: "b1", name: "Ultramovie R9 750W", pdfUrl: "" },
        { id: "b2", name: "Street Go S12 750W", pdfUrl: "" },
        { id: "b3", name: "Coswheel Y16 1000W", pdfUrl: "" },
        { id: "b4", name: "Eflow S20 750W Semi Nova", pdfUrl: "" },
        { id: "b5", name: "Eflow D20 750W", pdfUrl: "" },
        { id: "b6", name: "Evoo E20 1000W", pdfUrl: "" },
        { id: "b7", name: "V8 Pro 1000W", pdfUrl: "" },
        { id: "b8", name: "Ouxi GT20/Q8 1000W", pdfUrl: "" },
        { id: "b9", name: "Evoo Tank 500W", pdfUrl: "" },
        { id: "b10", name: "Evoo Vibe 50", pdfUrl: "" }
      ],
      scooters: [
        { id: "s1", name: "Yoo 200 500W", pdfUrl: "" },
        { id: "s2", name: "Eagle 1000W", pdfUrl: "" },
        { id: "s3", name: "Torino 1000W", pdfUrl: "" },
        { id: "s4", name: "Ultra X 1000W", pdfUrl: "" },
        { id: "s5", name: "Storm 1000W", pdfUrl: "" },
        { id: "s6", name: "Blizzard 1000W", pdfUrl: "" },
        { id: "s7", name: "Ultramax 1000W", pdfUrl: "" },
        { id: "s8", name: "Capri 1000W", pdfUrl: "" },
        { id: "s9", name: "Triciclo Ultra Tree", pdfUrl: "" },
        { id: "s10", name: "Scooter Evo E4 Plus 1000W", pdfUrl: "" },
        { id: "s11", name: "Scooter Eflow E9 1000W", pdfUrl: "" },
        { id: "s12", name: "Scooter Pop 500W", pdfUrl: "" },
        { id: "s13", name: "Scooter Eflow P13 1000W", pdfUrl: "" }
      ],
      outros: [
        { id: "o1", name: "Drift Crazy", pdfUrl: "" }
      ]
    };

    const CAT_ICONS = { patinetes: "🛴", bikes: "🚲", scooters: "🛵", outros: "⚡" };
    const CAT_LABELS = { patinetes: "Patinetes", bikes: "Bikes Elétricas", scooters: "Scooters Elétricas", outros: "Outros" };

    let appData = null;
    let currentPage = "catalog";
    let activeCategory = "all";
    let searchQuery = "";

    function uid() { return Math.random().toString(36).slice(2, 9); }

    function getAllVehicles(data) {
      return Object.entries(data).flatMap(([cat, items]) =>
        items.map(v => ({ ...v, category: cat }))
      );
    }

    // ── RENDER CATALOG ──────────────────────────────────────────────────────
    function renderCatalog() {
      const all = getAllVehicles(appData);
      const filtered = all.filter(v => {
        const matchCat = activeCategory === "all" || v.category === activeCategory;
        const matchSearch = v.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      const catCounts = {};
      Object.keys(appData).forEach(k => catCounts[k] = appData[k].length);

      document.getElementById("app").innerHTML = `
        <div class="header">
          <div class="logo">
            <div class="logo-icon">⚡</div>
            <div>
              <div class="logo-name">E-PULSE</div>
              <div class="logo-sub">Manuais de Usuário</div>
            </div>
          </div>
          <button class="admin-btn" onclick="goAdmin()">⚙ ADMIN</button>
        </div>

        <div class="hero">
          <h1 class="hero-title">MANUAIS DOS <span class="yellow">ELÉTRICOS</span></h1>
          <p class="hero-sub">${all.length} modelos disponíveis · Criciúma e região</p>
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input class="search-input" type="text" placeholder="Buscar modelo..." value="${searchQuery}" oninput="onSearch(this.value)" />
          </div>
        </div>

        <div class="cats">
          <button class="cat-btn ${activeCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">
            Todos <span class="cat-count">${all.length}</span>
          </button>
          ${Object.entries(CAT_LABELS).map(([key, label]) => `
            <button class="cat-btn ${activeCategory === key ? 'active' : ''}" onclick="setCategory('${key}')">
              ${CAT_ICONS[key]} ${label} <span class="cat-count">${catCounts[key] || 0}</span>
            </button>
          `).join("")}
        </div>

        <div class="grid" id="vehicle-grid">
          ${filtered.length === 0 ? `
            <div class="empty">
              <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
              <div>NENHUM MODELO ENCONTRADO</div>
            </div>
          ` : filtered.map(v => `
            <div class="card ${v.pdfUrl ? 'clickable' : ''}" onclick="${v.pdfUrl ? `openPdf('${encodeURIComponent(JSON.stringify(v))}')` : ''}">
              <div class="card-info">
                <div class="card-name">${v.name}</div>
                <span class="badge">${CAT_ICONS[v.category]} ${CAT_LABELS[v.category]}</span>
              </div>
              <div class="card-icon ${v.pdfUrl ? 'has-pdf' : 'no-pdf'}">
                ${v.pdfUrl
                  ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><polyline points="9 15 12 18 15 15"/></svg>`
                  : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
                }
              </div>
            </div>
          `).join("")}
        </div>

        <div class="legend">
          <span>⬇️ Clique para abrir o manual</span>
          <span>⚠️ Sem PDF = em breve</span>
        </div>
      `;
    }

    // ── PDF MODAL ───────────────────────────────────────────────────────────
    window.openPdf = function(encoded) {
      const v = JSON.parse(decodeURIComponent(encoded));
      const url = v.pdfUrl.includes("drive.google.com")
        ? v.pdfUrl.replace("/view", "").replace("/edit", "") + "?usp=sharing"
        : v.pdfUrl;

      const modal = document.createElement("div");
      modal.className = "modal-overlay";
      modal.innerHTML = `
        <div class="modal-box">
          <div class="modal-label">MANUAL DO USUÁRIO</div>
          <div class="modal-name">${v.name}</div>
          <a href="${url}" target="_blank" class="modal-btn-primary">↗ ABRIR MANUAL NO GOOGLE DRIVE</a>
          <button class="modal-btn-close" onclick="this.closest('.modal-overlay').remove()">Fechar</button>
        </div>
      `;
      modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
    };

    // ── ADMIN LOGIN ─────────────────────────────────────────────────────────
    function renderAdminLogin() {
      document.getElementById("app").innerHTML = `
        <div class="login-wrap">
          <div class="login-box">
            <div class="login-icon">⚡</div>
            <div class="login-title">E-PULSE ADMIN</div>
            <div class="login-sub">Acesso restrito</div>
            <input class="login-input" id="pass-input" type="password" placeholder="Senha de acesso"
              onkeydown="if(event.key==='Enter') tryLogin()" />
            <div id="login-error" class="login-error"></div>
            <button class="btn-yellow" onclick="tryLogin()">ENTRAR</button>
            <button class="btn-ghost" onclick="renderCatalog(); currentPage='catalog'">← Voltar</button>
          </div>
        </div>
      `;
      setTimeout(() => document.getElementById("pass-input")?.focus(), 100);
    }

    window.tryLogin = function() {
      const val = document.getElementById("pass-input").value;
      if (val === ADMIN_PASSWORD) {
        currentPage = "admin";
        renderAdmin();
      } else {
        const err = document.getElementById("login-error");
        err.textContent = "Senha incorreta.";
        setTimeout(() => { if (err) err.textContent = ""; }, 2000);
      }
    };

    // ── ADMIN PANEL ─────────────────────────────────────────────────────────
    function renderAdmin(adminData) {
      const data = adminData || JSON.parse(JSON.stringify(appData));
      window._adminData = data;

      document.getElementById("app").innerHTML = `
        <div class="admin-header">
          <div class="logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-name">E-PULSE <span class="yellow">ADMIN</span></span>
          </div>
          <div class="admin-actions">
            <span id="admin-msg" class="admin-msg"></span>
            <button class="btn-yellow" onclick="saveToFirestore()">💾 SALVAR</button>
            <button class="btn-danger-sm" onclick="renderCatalog(); currentPage='catalog'">Sair</button>
          </div>
        </div>

        <div class="admin-body">
          <div class="tabs">
            <button class="tab active" id="tab-list" onclick="switchTab('list')">📋 MODELOS</button>
            <button class="tab" id="tab-add" onclick="switchTab('add')">➕ NOVO MODELO</button>
          </div>

          <div id="tab-content-list">
            ${Object.entries(data).map(([cat, items]) => items.length === 0 ? "" : `
              <div class="admin-section">
                <div class="admin-section-title">${CAT_ICONS[cat]} ${CAT_LABELS[cat]} (${items.length})</div>
                ${items.map(v => `
                  <div class="admin-row" id="row-${v.id}">
                    <div class="admin-row-info">
                      <div class="admin-row-name">${v.name}</div>
                      <div class="admin-row-status ${v.pdfUrl ? 'has' : 'missing'}">${v.pdfUrl ? "✅ PDF vinculado" : "⚠️ Sem PDF ainda"}</div>
                    </div>
                    <div class="admin-row-btns">
                      <button class="btn-edit" onclick="editRow('${v.id}','${cat}')">EDITAR</button>
                      <button class="btn-del" onclick="deleteRow('${v.id}','${cat}')">REMOVER</button>
                    </div>
                  </div>
                `).join("")}
              </div>
            `).join("")}
          </div>

          <div id="tab-content-add" style="display:none">
            <div class="add-form">
              <div class="admin-section-title">ADICIONAR NOVO MODELO</div>
              <label class="field-label">Nome do modelo *</label>
              <input class="field-input" id="new-name" type="text" placeholder="Ex: Ultra X 1000W" />
              <label class="field-label">Link do Google Drive</label>
              <input class="field-input" id="new-url" type="text" placeholder="https://drive.google.com/file/d/..." />
              <div class="field-hint">Compartilhamento: "Qualquer pessoa com o link pode visualizar"</div>
              <label class="field-label">Categoria</label>
              <select class="field-input field-select" id="new-cat">
                ${Object.entries(CAT_LABELS).map(([k, l]) => `<option value="${k}">${l}</option>`).join("")}
              </select>
              <button class="btn-yellow" style="width:100%;margin-top:8px" onclick="addVehicle()">➕ ADICIONAR MODELO</button>
            </div>
          </div>
        </div>
      `;
    }

    window.switchTab = function(tab) {
      document.getElementById("tab-content-list").style.display = tab === "list" ? "block" : "none";
      document.getElementById("tab-content-add").style.display = tab === "add" ? "block" : "none";
      document.getElementById("tab-list").classList.toggle("active", tab === "list");
      document.getElementById("tab-add").classList.toggle("active", tab === "add");
    };

    window.editRow = function(id, cat) {
      const v = window._adminData[cat].find(x => x.id === id);
      const row = document.getElementById("row-" + id);
      row.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:8px;width:100%">
          <input class="field-input" id="edit-name-${id}" value="${v.name}" placeholder="Nome" />
          <input class="field-input" id="edit-url-${id}" value="${v.pdfUrl}" placeholder="Link Google Drive" />
          <select class="field-input field-select" id="edit-cat-${id}">
            ${Object.entries(CAT_LABELS).map(([k, l]) => `<option value="${k}" ${k === cat ? "selected" : ""}>${l}</option>`).join("")}
          </select>
          <div style="display:flex;gap:8px">
            <button class="btn-yellow" onclick="saveEdit('${id}','${cat}')">SALVAR</button>
            <button class="btn-danger-sm" onclick="renderAdmin(window._adminData)">CANCELAR</button>
          </div>
        </div>
      `;
    };

    window.saveEdit = function(id, oldCat) {
      const name = document.getElementById("edit-name-" + id).value.trim();
      const pdfUrl = document.getElementById("edit-url-" + id).value.trim();
      const newCat = document.getElementById("edit-cat-" + id).value;
      if (!name) return;
      const data = window._adminData;
      if (oldCat !== newCat) {
        data[oldCat] = data[oldCat].filter(x => x.id !== id);
        data[newCat] = [...data[newCat], { id, name, pdfUrl }];
      } else {
        data[oldCat] = data[oldCat].map(x => x.id === id ? { id, name, pdfUrl } : x);
      }
      flashMsg("✅ Editado — clique em Salvar");
      renderAdmin(data);
    };

    window.deleteRow = function(id, cat) {
      if (!confirm(`Remover este modelo?`)) return;
      window._adminData[cat] = window._adminData[cat].filter(x => x.id !== id);
      flashMsg("🗑️ Removido — clique em Salvar");
      renderAdmin(window._adminData);
    };

    window.addVehicle = function() {
      const name = document.getElementById("new-name").value.trim();
      const pdfUrl = document.getElementById("new-url").value.trim();
      const cat = document.getElementById("new-cat").value;
      if (!name) { alert("Digite o nome do modelo."); return; }
      window._adminData[cat] = [...window._adminData[cat], { id: uid(), name, pdfUrl }];
      flashMsg("✅ Adicionado — clique em Salvar");
      renderAdmin(window._adminData);
    };

    function flashMsg(msg) {
      const el = document.getElementById("admin-msg");
      if (!el) return;
      el.textContent = msg;
      setTimeout(() => { if (el) el.textContent = ""; }, 3000);
    }

    window.saveToFirestore = async function() {
      const btn = document.querySelector(".admin-header .btn-yellow");
      btn.textContent = "SALVANDO...";
      btn.disabled = true;
      try {
        await setDoc(DOC_REF, window._adminData);
        appData = JSON.parse(JSON.stringify(window._adminData));
        flashMsg("✅ Salvo no Firestore!");
      } catch (e) {
        alert("❌ Erro ao salvar: " + e.message);
      } finally {
        btn.textContent = "💾 SALVAR";
        btn.disabled = false;
      }
    };

    // ── NAVEGAÇÃO ────────────────────────────────────────────────────────────
    window.goAdmin = function() { currentPage = "adminLogin"; renderAdminLogin(); };
    window.setCategory = function(cat) { activeCategory = cat; renderCatalog(); };
    window.onSearch = function(val) { searchQuery = val; renderCatalog(); };

    // ── INIT ─────────────────────────────────────────────────────────────────
    document.getElementById("app").innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#FFD600;font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;letter-spacing:.1em;gap:16px">
        ⚡ CARREGANDO...
        <span style="font-size:.75rem;color:#555;letter-spacing:.05em">Conectando ao banco de dados...</span>
      </div>`;

    // Timeout de 8s — se Firestore não responder, usa dados locais
    const firestoreTimeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error("timeout")), 8000)
    );

    try {
      const snap = await Promise.race([getDoc(DOC_REF), firestoreTimeout]);
      if (snap.exists()) {
        appData = snap.data();
      } else {
        await setDoc(DOC_REF, INITIAL_DATA);
        appData = INITIAL_DATA;
      }
    } catch (e) {
      console.error("Firestore error:", e);
      appData = INITIAL_DATA;
      // Avisa que Firestore não está configurado (só aparece no console)
      if (e.message === "timeout") {
        console.warn("⚠️ Firestore não respondeu. Verifique se o banco foi criado no Firebase Console.");
      }
    }
    renderCatalog();

    // ESC fecha modal
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") document.querySelector(".modal-overlay")?.remove();
    });
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0a0a0a; color: #fff; font-family: 'Barlow', sans-serif; min-height: 100vh; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #FFD600; }

    .yellow { color: #FFD600; }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg,#111 0%,rgba(17,17,17,.98) 100%);
      border-bottom: 2px solid #FFD600;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(12px);
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon { width:40px;height:40px;background:#FFD600;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900; }
    .logo-name { font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:.08em;line-height:1; }
    .logo-sub { font-size:.62rem;color:#FFD600;letter-spacing:.15em;font-weight:700;text-transform:uppercase; }
    .admin-btn {
      padding: 8px 16px; background: transparent; color: #555;
      border: 1px solid #222; border-radius: 8px; cursor: pointer;
      font-size: .78rem; font-weight: 600; letter-spacing: .06em;
      font-family: inherit; transition: all .15s;
    }
    .admin-btn:hover { color: #FFD600; border-color: #FFD600; }

    /* HERO */
    .hero {
      padding: 48px 24px 36px; text-align: center;
      background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,214,0,.06) 0%, transparent 70%);
    }
    .hero-title { font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:.04em;line-height:1;margin-bottom:10px; }
    .hero-sub { color:#888;font-size:.95rem;margin-bottom:32px; }
    .search-wrap { max-width:480px;margin:0 auto;position:relative; }
    .search-icon { position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:.4;color:#fff; }
    .search-input {
      width:100%;padding:14px 16px 14px 44px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:12px;color:#fff;font-size:.95rem;font-family:inherit;outline:none;transition:all .2s;
    }
    .search-input:focus { border-color:rgba(255,214,0,.6);box-shadow:0 0 0 3px rgba(255,214,0,.08); }
    .search-input::placeholder { color:rgba(255,255,255,.25); }

    /* CATEGORY TABS */
    .cats { padding:0 24px 24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center; }
    .cat-btn {
      padding:9px 18px;border-radius:50px;border:1px solid rgba(255,255,255,.1);
      background:transparent;color:#aaa;cursor:pointer;font-weight:700;font-size:.82rem;
      font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;transition:all .15s;text-transform:uppercase;
    }
    .cat-btn.active { background:#FFD600;color:#000;border-color:#FFD600; }
    .cat-btn:not(.active):hover { border-color:rgba(255,214,0,.4);color:#FFD600; }
    .cat-count { margin-left:6px;opacity:.7;font-weight:400; }

    /* GRID */
    .grid { max-width:960px;margin:0 auto;padding:0 20px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px; }
    .empty { grid-column:1/-1;text-align:center;color:#444;padding:60px 0;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;letter-spacing:.06em; }

    /* CARD */
    .card {
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
      border-radius:12px;padding:18px 20px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      transition:all .2s ease;
    }
    .card.clickable { cursor:pointer; }
    .card.clickable:hover {
      background:rgba(255,214,0,.07);border-color:#FFD600;
      transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,214,0,.1);
    }
    .card.clickable:hover .card-icon.has-pdf { background:#FFD600; }
    .card.clickable:hover .card-icon.has-pdf svg { stroke:#000; }
    .card-info { flex:1; }
    .card-name { font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;color:#fff;margin-bottom:6px;letter-spacing:.02em; }
    .badge { font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:rgba(255,200,0,.15);color:#FFD600;border:1px solid rgba(255,214,0,.3); }
    .card-icon { width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s; }
    .card-icon.has-pdf { background:rgba(255,214,0,.15); }
    .card-icon.has-pdf svg { stroke:#FFD600; }
    .card-icon.no-pdf { background:rgba(255,255,255,.05); }
    .card-icon.no-pdf svg { stroke:rgba(255,255,255,.2); }

    /* LEGEND */
    .legend { max-width:960px;margin:0 auto;padding:0 20px 60px;text-align:center; }
